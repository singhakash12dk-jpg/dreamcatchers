<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Standard Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- iOS Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DreamCatchers" />
    <meta name="apple-touch-fullscreen" content="yes" />
    
    <!-- Android Specific Meta Tags -->
    <meta name="theme-color" content="#050505" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- General Mobile Optimization -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <meta name="x-ua-compatible" content="IE=edge" />
    
    <!-- App icons -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
    
    <title>Dreamcatcher Studios | Creative Technology Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="js-error-overlay" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.85);color:#fff;padding:24px;font-family:Inter,system-ui,Arial,Helvetica,sans-serif;overflow:auto;"></div>
    <script>
      (function(){
        function showError(msg){
          var el = document.getElementById('js-error-overlay');
          if(!el) return; el.style.display='block'; el.innerText = msg;
        }
        window.addEventListener('error', function(e){
          var msg = (e && (e.message || (e.error && e.error.message))) || String(e);
          var stack = (e && e.error && e.error.stack) || (e && e.stack) || '';
          showError('Error: ' + msg + '\n\n' + stack);
          console.error(e.error || e.message || e);
        });
        window.addEventListener('unhandledrejection', function(e){
          var msg = (e && e.reason && (e.reason.message || String(e.reason))) || String(e.reason || e);
          var stack = (e && e.reason && e.reason.stack) || '';
          showError('Unhandled Promise Rejection: ' + msg + '\n\n' + stack);
          console.error('UnhandledRejection', e.reason);
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
